name: Release — Tag & GHCR

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cyberdeck

jobs:
  release-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  release-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeXLive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-extra texlive-fonts-recommended latexmk
      - name: Build PDFs
        run: |
          cd docs/latex
          for f in *.tex; do latexmk -pdf -interaction=nonstopmode "$f" || true; done
      - uses: softprops/action-gh-release@v2
        with:
          files: docs/latex/*.pdf
          generate_release_notes: true
