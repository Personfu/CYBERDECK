name: CI — Build, Test & Publish

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cyberdeck

jobs:
  # ──────────────────────────── API tests ────────────────────────────
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r reqs.txt
      - run: pytest test_api.py -v --tb=short

  # ──────────────────────────── LaTeX docs ───────────────────────────
  latex-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeXLive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-extra texlive-fonts-recommended latexmk
      - name: Build PDFs
        run: |
          cd docs/latex
          for f in *.tex; do
            latexmk -pdf -interaction=nonstopmode "$f" || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: latex-pdfs
          path: docs/latex/*.pdf

  # ──────────────────────────── Docker build ─────────────────────────
  docker-build:
    needs: [api-test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest,${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────── Compose smoke ────────────────────────
  compose-smoke:
    needs: [api-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        working-directory: infra/docker
        run: |
          docker compose up --build -d
          sleep 8
      - name: Healthz
        run: curl -sf http://localhost:8000/healthz | grep ONLINE
      - name: Seeded projects
        run: curl -sf http://localhost:8000/projects | grep CYBERDECK-MK1-BUILD
      - name: Web UI
        run: curl -sf http://localhost:3000/ | grep CyberDeck
      - name: E2E — create project
        run: |
          ID=$(curl -sf -X POST http://localhost:8000/projects \
            -H 'Content-Type: application/json' \
            -d '{"name":"CI-SMOKE","summary":"ci run"}' | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          curl -sf -X POST "http://localhost:8000/projects/$ID/targets" \
            -H 'Content-Type: application/json' \
            -d '{"name":"CI Device","kind":"router"}'
          curl -sf -X POST "http://localhost:8000/projects/$ID/sessions" \
            -H 'Content-Type: application/json' \
            -d '{"interface_type":"UART","voltage":"3.3V"}'
          RID=$(curl -sf -X POST http://localhost:8000/reports/generate \
            -H 'Content-Type: application/json' \
            -d "{\"project_id\":\"$ID\",\"title\":\"CI Report\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          curl -sf "http://localhost:8000/reports/$RID/view" | grep "CI Report"
      - name: Teardown
        if: always()
        working-directory: infra/docker
        run: docker compose down -v
