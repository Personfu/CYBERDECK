version: '3.8'
services:
  api:
    build: ../../apps/api
    container_name: fllc-cyberdeck-api
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/data
    environment:
      - DATA_DIR=/data
      - JWT_SECRET=cyberdeck-secret-change-me

  worker:
    build: ../../apps/worker
    container_name: fllc-cyberdeck-worker
    depends_on:
      - api
    volumes:
      - ../../data:/data
    environment:
      - API_URL=http://api:8000

  web:
    build: ../../apps/web
    container_name: fllc-cyberdeck-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000

